name: iOS Quality and TestFlight

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  FLUTTER_VERSION: 3.44.6

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter expanded

  build-ios:
    name: Build and upload signed IPA
    needs: quality
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Verify launcher icon source
        run: |
          set -euo pipefail

          if [ ! -f assets/icons/app_icon.png ]; then
            echo "::error::Missing assets/icons/app_icon.png. Add your launcher icon PNG there before uploading an App Store build."
            exit 1
          fi

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          for secret_name in BUILD_CERTIFICATE_BASE64 P12_PASSWORD BUILD_PROVISION_PROFILE_BASE64 KEYCHAIN_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required GitHub secret: $secret_name"
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[" ]//g')
          security default-keychain -s "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q 'Apple Distribution'; then
            echo "::error::No Apple Distribution code-signing identity was found in the imported P12 certificate. Export an Apple Distribution certificate from Keychain Access and update BUILD_CERTIFICATE_BASE64/P12_PASSWORD."
            exit 1
          fi

      - name: Configure Xcode signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::Missing required GitHub secret: APPLE_TEAM_ID"
            exit 1
          fi

          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          project_path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = project_path.read_text()

          team_id = os.environ["APPLE_TEAM_ID"]
          profile_name = os.environ["PROFILE_NAME"]
          bundle_id = "ch.gregiwaller.trollrunner"

          def upsert(setting_block: str, key: str, value: str) -> str:
              pattern = rf"(\n\s*){re.escape(key)} = [^;]+;"
              replacement = rf"\1{key} = {value};"
              if re.search(pattern, setting_block):
                  return re.sub(pattern, replacement, setting_block)
              return setting_block.replace("\n\t\t\t};", f"\n\t\t\t\t{key} = {value};\n\t\t\t}};")

          def configure_runner_build_settings(match: re.Match) -> str:
              block = match.group(0)
              if f"PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};" not in block:
                  return block
              settings = {
                  "CODE_SIGN_STYLE": "Manual",
                  "DEVELOPMENT_TEAM": team_id,
                  "CODE_SIGN_IDENTITY": '"Apple Distribution"',
                  '"CODE_SIGN_IDENTITY[sdk=iphoneos*]"': '"Apple Distribution"',
                  "PROVISIONING_PROFILE_SPECIFIER": f'"{profile_name}"',
              }
              for key, value in settings.items():
                  block = upsert(block, key, value)
              return block

          text = re.sub(
              r"\t\t[A-F0-9]+ /\* (?:Debug|Release|Profile) \*/ = \{.*?\n\t\t\};",
              configure_runner_build_settings,
              text,
              flags=re.S,
          )

          project_path.write_text(text)
          PY

      - name: Create ExportOptions.plist
        run: |
          set -euo pipefail

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ch.gregiwaller.trollrunner</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: |
          set -euo pipefail
          flutter build ipa --release \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ExportOptions.plist \
            --no-pub

      - name: Find IPA
        run: |
          set -euo pipefail
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file was produced in build/ios/ipa"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Found IPA: $IPA_PATH"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@1ad58030672057aa084b4e96beb6f7a8c627f9e6 # v5.2.1
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Remove signing material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/build_certificate.p12"
          rm -f "$RUNNER_TEMP/build_pp.mobileprovision"
          rm -f "$RUNNER_TEMP/profile.plist"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID:-}.mobileprovision"
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
