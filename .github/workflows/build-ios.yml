name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          for secret_name in BUILD_CERTIFICATE_BASE64 P12_PASSWORD BUILD_PROVISION_PROFILE_BASE64 KEYCHAIN_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required GitHub secret: $secret_name"
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[" ]//g')
          security default-keychain -s "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          echo "Installed signing identities in $KEYCHAIN_PATH:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q 'Apple Distribution'; then
            echo "::error::No Apple Distribution code-signing identity was found in the imported P12 certificate. Export an Apple Distribution certificate from Keychain Access and update BUILD_CERTIFICATE_BASE64/P12_PASSWORD."
            exit 1
          fi

      - name: Configure Xcode signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::Missing required GitHub secret: APPLE_TEAM_ID"
            exit 1
          fi

          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          project_path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = project_path.read_text()

          team_id = os.environ["APPLE_TEAM_ID"]
          profile_name = os.environ["PROFILE_NAME"]
          bundle_id = "ch.gregiwaller.trollrunner"

          def upsert(setting_block: str, key: str, value: str) -> str:
              pattern = rf"(\n\s*){re.escape(key)} = [^;]+;"
              replacement = rf"\1{key} = {value};"
              if re.search(pattern, setting_block):
                  return re.sub(pattern, replacement, setting_block)
              return setting_block.replace("\n\t\t\t};", f"\n\t\t\t\t{key} = {value};\n\t\t\t}};")

          def configure_runner_build_settings(match: re.Match) -> str:
              block = match.group(0)
              if f"PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};" not in block:
                  return block
              settings = {
                  "CODE_SIGN_STYLE": "Manual",
                  "DEVELOPMENT_TEAM": team_id,
                  "CODE_SIGN_IDENTITY": '"Apple Distribution"',
                  '"CODE_SIGN_IDENTITY[sdk=iphoneos*]"': '"Apple Distribution"',
                  "PROVISIONING_PROFILE_SPECIFIER": f'"{profile_name}"',
              }
              for key, value in settings.items():
                  block = upsert(block, key, value)
              return block

          text = re.sub(
              r"\t\t[A-F0-9]+ /\* (?:Debug|Release|Profile) \*/ = \{.*?\n\t\t\};",
              configure_runner_build_settings,
              text,
              flags=re.S,
          )

          project_path.write_text(text)
          PY

          echo "Signing settings:"
          grep -nE "DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj
          
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ch.gregiwaller.trollrunner</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

          echo "ExportOptions.plist created:"
          ls -la ExportOptions.plist
          cat ExportOptions.plist

      - name: Build signed IPA
        run: |
          set -euo pipefail
          flutter build ipa --release \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ExportOptions.plist \
            --no-pub

      - name: Find IPA
        run: |
          set -euo pipefail
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file was produced in build/ios/ipa"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Found IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollJump-signed-ipa
          path: ${{ env.IPA_PATH }}

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
