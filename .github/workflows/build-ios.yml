name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "Installed signing identities:"
          security find-identity -v -p codesigning

      - name: Configure Xcode signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          project_path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = project_path.read_text()

          team_id = os.environ["APPLE_TEAM_ID"]
          profile_name = os.environ["PROVISIONING_PROFILE_NAME"]
          bundle_id = "ch.gregiwaller.trollrunner"

          text = re.sub(
              r"PRODUCT_BUNDLE_IDENTIFIER = [^;]+;",
              f"PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};",
              text
          )

          replacements = {
              "DEVELOPMENT_TEAM": team_id,
              "CODE_SIGN_STYLE": "Manual",
              "CODE_SIGN_IDENTITY": '"Apple Distribution"',
              "PROVISIONING_PROFILE_SPECIFIER": f'"{profile_name}"',
          }

          for key, value in replacements.items():
              text = re.sub(
                  rf"{key} = [^;]+;",
                  f"{key} = {value};",
                  text
              )

          text = re.sub(
              r'"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = [^;]+;',
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";',
              text
          )

          project_path.write_text(text)
          PY

          echo "Signing settings:"
          grep -n "DEVELOPMENT_TEAM\|CODE_SIGN_STYLE\|CODE_SIGN_IDENTITY\|PROVISIONING_PROFILE_SPECIFIER\|PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj
          
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ch.gregiwaller.trollrunner</key>
              <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

          echo "ExportOptions.plist created:"
          ls -la ExportOptions.plist
          cat ExportOptions.plist

      - name: Build signed IPA
        run: |
          flutter build ipa --release \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ExportOptions.plist \
            --no-pub

      - name: Find IPA
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV
          echo "Found IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollJump-signed-ipa
          path: ${{ env.IPA_PATH }}

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
